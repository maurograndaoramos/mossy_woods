<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mossy Woods — Wren's Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Italianno&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">

      <!-- Background -->
      <div class="bg-layer">
        <div class="bg-image"></div>
        <div class="bg-tint"></div>
        <div class="bg-vignette"></div>
        <div class="bg-moon"></div>
        <div class="bg-stars" id="stars"></div>
        <div class="bg-particles" id="particles"></div>
      </div>

      <!-- Hamburger -->
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <!-- Top-right phase indicator -->
      <div class="phase-pill">
        <span class="phase-glyph">☽</span>
        <span class="phase-text">Waxing Crescent · Month of Reeds</span>
      </div>

      <!-- Slide-in Nav -->
      <nav class="nav-panel" id="navPanel">
        <div class="nav-header">
          <div class="nav-moon-row">☽ ◐ ● ◑ ☾</div>
          <h1 class="nav-title">Mossy Woods</h1>
          <p class="nav-sub">Wren's Chronicle</p>
        </div>
        <ul class="nav-list">
          <li><a href="#" data-page="home" class="active"><span class="nav-glyph">☾</span>The Sheet</a></li>
          <li><a href="#" data-page="vows"><span class="nav-glyph">❋</span>Vows &amp; Journeys</a></li>
          <li><a href="#" data-page="moves"><span class="nav-glyph">✦</span>Moves</a></li>
          <li><a href="#" data-page="lore"><span class="nav-glyph">❀</span>World Lore</a></li>
          <li><a href="#" data-page="wiki"><span class="nav-glyph">✿</span>The Wiki</a></li>
        </ul>
        <div class="nav-footer">
          <div class="nav-divider"></div>
          <p class="nav-footnote">A consult by lamplight,<br/>for a witch who travels far.</p>
        </div>
      </nav>
      <div class="nav-overlay" id="navOverlay"></div>

      <!-- Pages -->
      <main class="pages">
        <section class="page active" id="page-home" data-screen-label="01 The Sheet"></section>
        <section class="page" id="page-vows" data-screen-label="02 Vows"></section>
        <section class="page" id="page-moves" data-screen-label="03 Moves"></section>
        <section class="page" id="page-lore" data-screen-label="04 Lore"></section>
        <section class="page" id="page-wiki" data-screen-label="05 Wiki"></section>
      </main>

      <!-- Card Modal -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
          <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
          <div class="modal-content" id="modalContent"></div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
